<!DOCTYPE html>
<html lang='vi'>
<head>
<meta charset='UTF-8'>
<meta name='viewport' content='width=device-width, initial-scale=1'>
<title>Smart Clock Pro</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:Arial,sans-serif;background:#1a1a2e;color:#eee;padding:15px;text-align:center}
  .card{background:#16213e;border-radius:15px;padding:15px;margin-bottom:15px;text-align:left;box-shadow:0 4px 10px rgba(0,0,0,0.3)}
  h3{color:#e94560;margin-bottom:12px;font-size:1.1em;border-bottom:1px solid #0f3460;padding-bottom:5px}
  .time{font-size:3em;font-weight:bold;color:#fff;text-align:center;margin:10px 0}
  .time span{color:#e94560;font-size:0.5em}
  .btn{padding:12px;border:none;border-radius:8px;font-size:0.9em;cursor:pointer;font-weight:bold;transition:0.3s;width:100%;color:#fff}
  .btn-off{background:#555}
  .btn-guest{background:#27ae60}
  .btn-thief{background:#e74c3c}
  .btn-blue{background:#3498db}
  .btn-row{display:flex;gap:8px;margin-bottom:8px}
  .btn-row .btn{flex:1}
  input[type=time], input[type=range]{width:100%;margin:10px 0}
  .status{font-size:0.85em;color:#aaa;padding:8px;background:#0f3460;border-radius:6px;margin-top:5px}
  .active-tag{color:#27ae60;font-weight:bold}
  .dot{display:inline-block;width:10px;height:10px;border-radius:50%;margin-right:6px}
  .dot-green{background:#27ae60}
  .dot-gray{background:#777}
</style>
</head>
<body>
  <div class='time' id='clock'>00:00<span>:00</span></div>
  <div style='margin-bottom:15px'>Nhiệt độ: <span id='temp' style='color:#e94560'>--</span>°C</div>

  <!-- Chế độ -->
  <div class='card'>
    <h3>Chế độ & Lịch trình</h3>
    <div class='btn-row'>
      <button class='btn btn-off' onclick='setMode(0)'>TẮT</button>
      <button class='btn btn-guest' onclick='setMode(1)'>KHÁCH</button>
      <button class='btn btn-thief' onclick='setMode(2)'>TRỘM</button>
    </div>
    <div class='status' id='modeStatus'>Đang tải...</div>
    
    <div style='margin-top:15px'>
      <label style='font-size:0.8em'>Lịch tự động (Khách → Trộm):</label>
      <div class='btn-row'>
        <input type='time' id='schedStart' value="07:00">
        <input type='time' id='schedEnd' value="22:00">
      </div>
      <button class='btn btn-blue' onclick='saveSchedule()'>LƯU LỊCH TRÌNH</button>
    </div>
  </div>

  <!-- Âm nhạc -->
  <div class='card'>
    <h3>Âm nhạc & Âm lượng</h3>
    <button id='playBtn' class='btn' onclick='toggleMusic()'>PHÁT</button>
    
    <div class='btn-row' style='margin-top:12px'>
      <button class='btn btn-blue' onclick='prevTrack()'>⏮ Prev</button>
      <button class='btn btn-blue' onclick='nextTrack()'>⏭ Next</button>
    </div>
    
    <div style='margin-top:10px'>
      <label>Âm lượng: <span id='volVal'>15</span></label>
      <input type='range' id='volRange' min='0' max='30' value='15' oninput='setVolume(this.value)'>
    </div>
  </div>

  <!-- Báo thức -->
  <div class='card'>
    <h3>Báo thức ⏰</h3>
    <input type='time' id='alarmTime'>
    <button id='alarmBtn' class='btn btn-blue' onclick='toggleAlarm()'>BẬT BÁO THỨC</button>
  </div>

  <!-- Đèn -->
  <div class='card'>
    <h3>Đèn Chiếu Sáng</h3>
    <button id='lightBtn' class='btn btn-blue' onclick='toggleLight()'>BẬT / TẮT ĐÈN</button>
    <div class='status' id='lightStatus'>
      <span class='dot dot-gray'></span>Đèn: Đang tải...
    </div>
  </div>

<script>
function update(){
  fetch('/status').then(r=>r.json()).then(d=>{
    document.getElementById('clock').innerHTML = 
      d.h.toString().padStart(2,'0') + ':' + 
      d.m.toString().padStart(2,'0') + 
      '<span>:' + d.s.toString().padStart(2,'0') + '</span>';

    document.getElementById('temp').innerText = d.temp.toFixed(1);

    let mText = ['TẮT','KHÁCH','TRỘM'];
    document.getElementById('modeStatus').innerHTML = 
      "Trạng thái: <span class='active-tag'>" + mText[d.mode] + "</span>";

    // Âm nhạc
    let playBtn = document.getElementById('playBtn');
    playBtn.innerText = d.music ? 'DỪNG' : 'PHÁT';
    playBtn.style.background = d.music ? '#e74c3c' : '#27ae60';

    // Đèn
    let lightBtn = document.getElementById('lightBtn');
    let lightStatus = document.getElementById('lightStatus');
    lightBtn.innerText = d.light ? 'TẮT ĐÈN' : 'BẬT ĐÈN';
    lightStatus.innerHTML = d.light 
      ? "<span class='dot dot-green'></span>Đèn: Đang BẬT" 
      : "<span class='dot dot-gray'></span>Đèn: Đang TẮT";
  });
}

function setMode(m){ fetch('/mode?v='+m).then(()=>update()); }

function toggleMusic(){ fetch('/music').then(()=>update()); }
function prevTrack(){ fetch('/musicnav?act=prev').then(()=>update()); }
function nextTrack(){ fetch('/musicnav?act=next').then(()=>update()); }

function setVolume(v){ 
  fetch('/volume?v='+v).then(()=>update()); 
  document.getElementById('volVal').innerText = v;
}

function saveSchedule(){
  let s = document.getElementById('schedStart').value;
  let e = document.getElementById('schedEnd').value;
  if(!s || !e) return alert('Vui lòng chọn giờ!');
  fetch('/schedule?start='+s+'&end='+e).then(()=>alert('Đã lưu lịch trình!'));
}

function toggleAlarm(){
  let t = document.getElementById('alarmTime').value;
  if(!t) return alert('Chọn giờ báo thức!');
  fetch('/alarm?t='+t).then(()=>update());
}

function toggleLight(){ fetch('/light').then(()=>update()); }

setInterval(update, 1000);
update();
</script>
</body>
</html>
