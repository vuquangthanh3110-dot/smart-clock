<!DOCTYPE html>
<html lang='vi'>
<head>
<meta charset='UTF-8'>
<meta name='viewport' content='width=device-width, initial-scale=1'>
<title>Smart Clock Pro</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:Arial,sans-serif;background:#1a1a2e;color:#eee;padding:15px;text-align:center}
  .card{background:#16213e;border-radius:15px;padding:15px;margin-bottom:15px;text-align:left;box-shadow:0 4px 10px rgba(0,0,0,0.3)}
  h3{color:#e94560;margin-bottom:12px;font-size:1.1em;border-bottom:1px solid #0f3460;padding-bottom:5px}
  .time{font-size:3em;font-weight:bold;color:#fff;text-align:center;margin:10px 0}
  .time span{color:#e94560;font-size:0.5em}
  .btn{padding:14px;border:none;border-radius:8px;font-size:0.95em;cursor:pointer;font-weight:bold;transition:0.3s;width:100%;color:#fff}
  .btn-off{background:#555}
  .btn-guest{background:#27ae60}
  .btn-thief{background:#e74c3c}
  .btn-blue{background:#3498db}
  .btn-row{display:flex;gap:12px;margin:12px 0}
  .btn-row .btn{flex:1}
  input[type=time], input[type=range]{width:100%;margin:10px 0}
  .status{font-size:0.85em;color:#aaa;padding:10px;background:#0f3460;border-radius:6px;margin-top:8px}
  .active-tag{color:#27ae60;font-weight:bold}
  .dot{display:inline-block;width:10px;height:10px;border-radius:50%;margin-right:6px}
  .dot-green{background:#27ae60}
  .dot-gray{background:#777}
</style>
</head>
<body>
  <div class='time' id='clock'>00:00<span>:00</span></div>
  <div style='margin-bottom:15px'>Nhiệt độ: <span id='temp' style='color:#e94560'>--</span>°C</div>

  <div class='card'>
    <h3>Chế độ & Lịch trình</h3>
    <div class='btn-row'>
      <button class='btn btn-off' onclick='setMode(0)'>TẮT</button>
      <button class='btn btn-guest' onclick='setMode(1)'>KHÁCH</button>
      <button class='btn btn-thief' onclick='setMode(2)'>TRỘM</button>
    </div>
    <div class='status' id='modeStatus'>Đang tải...</div>
    
    <div style='margin-top:15px'>
      <label>Lịch tự động:</label>
      <div class='btn-row'>
        <input type='time' id='schedStart'>
        <input type='time' id='schedEnd'>
      </div>
      <button class='btn btn-blue' onclick='saveSchedule()'>LƯU LỊCH</button>
    </div>
  </div>

  <div class='card'>
    <h3>Âm nhạc</h3>
    <button id='playBtn' class='btn' onclick='toggleMusic()'>PHÁT</button>
    <div class='btn-row'>
      <button class='btn btn-blue' onclick='prevTrack()'>⏮ Prev</button>
      <button class='btn btn-blue' onclick='nextTrack()'>⏭ Next</button>
    </div>
    <label>Âm lượng: <span id='volVal'>15</span></label>
    <input type='range' id='volRange' min='0' max='30' value='15' oninput='setVolume(this.value)'>
  </div>

  <div class='card'>
    <h3>Báo thức ⏰</h3>
    <input type='time' id='alarmTime'>
    <button id='alarmBtn' class='btn btn-blue' onclick='toggleAlarm()'>BẬT BÁO THỨC</button>
  </div>

  <div class='card'>
    <h3>Đèn Chiếu Sáng</h3>
    <button id='lightBtn' class='btn btn-blue' onclick='toggleLight()'>BẬT / TẮT ĐÈN</button>
    <div class='status' id='lightStatus'>
      <span class='dot dot-gray'></span>Đèn: Đang tải...
    </div>
  </div>

 <div class='card'>
    <h3>Serial Log</h3>
    <pre id='log' style='background:#0f3460;color:#0f0;padding:10px;height:200px;overflow-y:scroll;font-family:monospace;font-size:0.85em;white-space:pre-wrap'></pre>
  </div>

<script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
<script>
  let mqttClient = null;
  let isPlaying = false;
  let isLightOn = false;

  function connectMQTT() {
    mqttClient = mqtt.connect("wss://broker.hivemq.com:8884/mqtt", {
      clientId: "Web_" + Math.random().toString(16).substr(2,8)
    });

    mqttClient.on('connect', () => {
      console.log("✅ MQTT Connected");
      mqttClient.subscribe("dongho/status");
    });

    mqttClient.on('message', (topic, message) => {
      if (topic === "dongho/status") {
        try {
          const d = JSON.parse(message.toString());
          updateUI(d);
        } catch(e) {}
      }
    });
  }

  function updateUI(d) {
    document.getElementById('clock').innerHTML = 
      (d.h||0).toString().padStart(2,'0') + ':' + 
      (d.m||0).toString().padStart(2,'0') + 
      '<span>:' + (d.s||0).toString().padStart(2,'0') + '</span>';

    document.getElementById('temp').innerText = (d.temp||0).toFixed(1);

    const mText = ['TẮT','KHÁCH','TRỘM'];
    document.getElementById('modeStatus').innerHTML = 
      "Trạng thái: <span class='active-tag'>" + mText[d.mode||0] + "</span>";

    const playBtn = document.getElementById('playBtn');
    isPlaying = !!d.music;
    playBtn.innerText = isPlaying ? 'DỪNG' : 'PHÁT';
    playBtn.style.background = isPlaying ? '#e74c3c' : '#27ae60';

    isLightOn = d.light == 1;
    document.getElementById('lightBtn').innerText = isLightOn ? 'TẮT ĐÈN' : 'BẬT ĐÈN';
    document.getElementById('lightStatus').innerHTML = isLightOn 
      ? "<span class='dot dot-green'></span>Đèn: Đang BẬT" 
      : "<span class='dot dot-gray'></span>Đèn: Đang TẮT";
  }

  function setMode(m) { if(mqttClient) mqttClient.publish("dongho/mode/set", m.toString()); }
  function toggleMusic() { 
    isPlaying = !isPlaying;
    if(mqttClient) mqttClient.publish("dongho/music/set", isPlaying ? "1" : "0"); 
  }
  function prevTrack() { if(mqttClient) mqttClient.publish("dongho/music/prev", "1"); }
  function nextTrack() { if(mqttClient) mqttClient.publish("dongho/music/next", "1"); }
  function setVolume(v) { 
    if(mqttClient) mqttClient.publish("dongho/volume/set", v.toString()); 
    document.getElementById('volVal').innerText = v;
  }
  function toggleAlarm() {
  const t = document.getElementById('alarmTime').value;
  const btn = document.getElementById('alarmBtn');
  
  if (t) {
    if (btn.innerText.includes("BẬT")) {
      mqttClient.publish("dongho/alarm/set", t);
      btn.innerText = "TẮT BÁO THỨC";
      btn.style.background = "#e74c3c";
    } else {
      mqttClient.publish("dongho/alarm/off", "1");
      btn.innerText = "BẬT BÁO THỨC";
      btn.style.background = "#3498db";
    }
  }
}
  function toggleLight() { 
    if(mqttClient) mqttClient.publish("dongho/light/set", "toggle"); 
  }
  function saveSchedule() {
  const start = document.getElementById('schedStart').value;
  const end = document.getElementById('schedEnd').value;

  let logLines = [];
  function addLog(text) {
    logLines.push(text);
    if (logLines.length > 50) logLines.shift();  // Giữ tối đa 50 dòng
    document.getElementById('log').innerText = logLines.join('\n');
  }
   
  console.log("=== DEBUG LỊCH ===");
  console.log("Start:", start);
  console.log("End:", end);
  console.log("MQTT Client connected:", mqttClient ? mqttClient.connected : false);

  if (!start || !end) {
    alert("Vui lòng chọn thời gian!");
    return;
  }

  if (!mqttClient || !mqttClient.connected) {
    alert("MQTT chưa kết nối!");
    return;
  }

  mqttClient.publish("dongho/schedule/start", start);
  mqttClient.publish("dongho/schedule/end", end);
  
  alert("Đã gửi lịch đến ESP32! Kiểm tra Serial.");
}

  window.onload = () => {
    connectMQTT();
    setInterval(() => {
      if(mqttClient && mqttClient.connected) mqttClient.publish("dongho/status/request", "1");
    }, 1500);
  };
</script>
</body>
</html>
